<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WeatherStation</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <nav class="tabs-nav">
        <button class="tab-btn active" onclick="switchTab(event, 'live')">🔴 En Direct</button>
        <button class="tab-btn" onclick="switchTab(event, 'charts')">📊 Historique</button>
        <!-- <button class="tab-btn" onclick="switchTab(event, 'config')">⚙️ Configuration</button> -->
    </nav>

    <div id="tab-live" class="tab-content">
        <div id="time"></div>

        <div class="section">
            <div id="sondes" class="cards"></div>
        </div>


        <table>
            <tr>
                <td>
                    <div id="weatherCard" class="card mf-card">
                        <div id="weather">Chargement météo...</div>
                        <div id="forecastContainer" class="mf-forecast"></div>
                    </div>
                </td>
                <td>
                    <div id="metarCard" class="card">
                        <div id="metar">
                            Chargement metar...
                        </div>
                    </div>
                </td>
            </tr>

        </table>
    </div>

    <div id="tab-charts" class="tab-content hidden">
        <h2>Évolution sur les dernières 24 heures</h2>
        <p>Graphiques des relevés stockés en base de données.</p>
    </div>

    <script src="script.js"></script>

</body>
</html>
