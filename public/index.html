<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WeatherStation</title>

    <link rel="stylesheet" href="style/variable.css">
    <link rel="stylesheet" href="style/layout.css">
    <link rel="stylesheet" href="style/common.css">
    <link rel="stylesheet" href="style/metar.css">
    <link rel="stylesheet" href="style/meteoFrance.css">
    <link rel="stylesheet" href="style/sensors.css">
    <link rel="stylesheet" href="style/trend.css">
    <link rel="stylesheet" href="style/tab.css">
    <link rel="stylesheet" href="style/chart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body> 

    <div class="app">

        <aside class="sidebar">

            <div class="logo">
                <i class="bi bi-cloud-sun"></i>
            </div>

            <button class="nav-btn active"
                    onclick="switchTab(event,'home')">
                <i class="bi bi-speedometer2"></i>
                <!-- <span>Dashboard</span> -->
            </button>

            <button class="nav-btn"
                    onclick="switchTab(event,'charts')">
                <i class="bi bi-graph-up"></i>
                <!-- <span>Graphiques</span> -->
            </button>

            <button class="nav-btn"
                    onclick="switchTab(event,'history')">
                <i class="bi bi-clock-history"></i>
                <!-- <span>Historique</span> -->
            </button>

            <button class="nav-btn"
                    onclick="switchTab(event,'aviation')">
                <i class="bi bi-airplane"></i>
                <!-- <span>Aviation</span> -->
            </button>

            <button class="nav-btn"
                    onclick="switchTab(event,'config')">
                <i class="bi bi-gear"></i>
                <!-- <span>Configuration</span> -->
            </button>

        </aside>

        <main class="main">

            <div id="time"></div>

            <div id="tab-home" class="tab-content">
                
                <div class="section card">
                        <h2 class="sectionTitle">
                            <i class="bi bi-cpu"></i>
                            Sondes
                        </h2>

                        <div id="sondes" class="cards"></div>
                </div>

                <div class="section cards">
                    <div class="card">
                        <div class="sectionTitle flex-between">
                            <h2 class="sectionTitle mf-header flex-between">
                                <i class="bi bi-cloud-sun"></i>
                                Météo France
                            </h2>
                        </div>
                        <div id="weatherCard">Chargement météo...</div>
                        <div id="forecastContainer" class="grid grid-auto"></div>
                    </div>

                    <div class="card">
                        <div class="sectionTitle flex-between">
                            <h2>
                                <i class="bi bi-airplane-fill"></i>
                                    LFRN METAR
                            </h2>
                        </div>
                        <div id="metarCard">Chargement metar...</div>
                    </div>
                </div>

                <div class="section card">

                    <h2 class="sectionTitle">
                        <i class="bi bi-graph-up-arrow"></i>
                        Tendances
                    </h2>

                    <div id="trend" class="trendContainer"></div>

                </div>
            </div>

            <div id="tab-charts" class="tab-content hidden">

                <div class="chartToolbar">

                    <button onclick="loadCharts(1)">1 h</button>
                    <button onclick="loadCharts(6)">6 h</button>
                    <button onclick="loadCharts(24)">24 h</button>
                    <button onclick="loadCharts(72)">72 h</button>

                </div>
                <div class="card">
                    <h2>Température</h2>
                    <canvas id="temperatureChart"></canvas>
                </div>

                <div class="card">
                    <h2>Humidité</h2>
                    <canvas id="humidityChart"></canvas>
                </div>

                <div class="card">
                    <h2>Pression</h2>
                    <canvas id="pressureChart"></canvas>
                </div>
            </div>

            <div id="tab-history" class="tab-content hidden">

                history

            </div>

            <div id="tab-aviation" class="tab-content hidden">

                aviation

            </div>

            <div id="tab-config" class="tab-content hidden">
                <div class="section card">
                    <h2 class="sectionTitle">
                        <i class="bi bi-cpu"></i>
                        Gestion des sondes
                    </h2>
                    <div id="sensorConfigList" class="configGrid">
                        Chargement...
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script/chart.js"></script>
    <script src="script/config.js"></script>
    <script src="script/metar.js"></script>
    <script src="script/openMeteo.js"></script>
    <script src="script/sensor.js"></script>
    <script src="script/tab.js"></script>
    <script src="script/trend.js"></script>
    <script src="script/time.js"></script>
    <script src="script/script.js"></script>

</body>
</html>
